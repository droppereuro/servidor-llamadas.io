<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuestro Espacio Privado</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0; background: #121212; color: white; font-family: system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .setup-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 20px;
        }
        .call-screen { 
            display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; position: relative; 
        }
        
        /* Interfaz estilo llamada telefónica */
        .avatar-container {
            width: 130px; height: 130px; background: #222; border: 2px solid #2ed573; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(46, 213, 115, 0.2);
        }
        .status-text { font-size: 18px; color: #aaa; margin-bottom: 5px; }
        .timer-container {
            font-size: 24px; font-weight: bold; color: #2ed573; margin-bottom: 40px; letter-spacing: 1px;
        }

        .controls {
            display: flex; gap: 15px; width: 80%; max-width: 300px;
        }
        button {
            padding: 16px 20px; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: all 0.2s ease; width: 100%;
        }
        .btn-user { background: #333; color: white; border: 1px solid #555; width: auto; padding: 15px 40px; }
        .btn-call { background: #2ed573; color: white; }
        .btn-mute { background: #ff4757; color: white; display: none; }
        .btn-mute.muted { background: #ffa502; color: black; }
        
        /* Ocultamos los elementos de audio HTML ya que no necesitan ser visibles */
        audio { display: none; }
    </style>
</head>
<body>

    <!-- 1. Pantalla de Selección de Usuario -->
    <div id="setupScreen" class="setup-screen">
        <h2>¿Quién eres?</h2>
        <button class="btn-user" onclick="iniciarApp('daniel')">Soy Daniel</button>
        <button class="btn-user" onclick="iniciarApp('gisel')">Soy Gisel</button>
    </div>

    <!-- 2. Pantalla de la Llamada -->
    <div id="callScreen" class="call-screen">
        <div class="avatar-container">📞</div>
        <div id="status" class="status-text">Conectado al canal</div>
        <div id="timer" class="timer-container">00:00</div>
        
        <!-- Elementos nativos para reproducir el audio de la llamada -->
        <audio id="remoteAudio" autoplay></audio>
        <audio id="localAudio" autoplay muted></audio>
        
        <div class="controls">
            <button class="btn-mute" id="btnMute">Silenciar</button>
            <button class="btn-call" id="btnAccion">Llamar</button>
        </div>
    </div>

    <script>
        const SERVIDOR_URL = "https://servidor-llamadas-zg5q.onrender.com"; 
        
        let socket;
        let peerConnection;
        let localStream;
        let miUsuario = "";
        let miDestinatario = "";
        let tiempoIntervalo;
        let segundosTranscurridos = 0;
        let microfonoActivo = true;

        const rtcConfig = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun.services.mozilla.com' }
            ] 
        };

        function iniciarApp(usuario) {
            miUsuario = usuario;
            miDestinatario = (usuario === 'daniel') ? 'gisel' : 'daniel';

            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('btnAccion').innerText = `Llamar a ${miDestinatario.toUpperCase()}`;

            socket = io(SERVIDOR_URL);
            socket.emit('register', miUsuario);

            configurarSenales();
        }

        // Modificado: Ahora pide ÚNICAMENTE audio de forma nativa
        function solicitarMicrofono(callbackExito) {
            console.log("[AUDIO] Solicitando acceso exclusivo al micrófono...");
            navigator.mediaDevices.getUserMedia({ video: false, audio: true })
                .then(stream => {
                    console.log("[AUDIO] Acceso al micrófono concedido.");
                    localStream = stream;
                    document.getElementById('localAudio').srcObject = stream;
                    document.getElementById('btnMute').style.display = 'block';
                    callbackExito();
                })
                .catch(error => {
                    console.error("[ERROR] No se pudo acceder al micrófono:", error);
                    alert("Error crítico: No se puede iniciar la llamada sin permisos para el micrófono.");
                });
        }

        function iniciarTemporizador() {
            if (tiempoIntervalo) clearInterval(tiempoIntervalo);
            segundosTranscurridos = 0;
            document.getElementById('status').innerText = "EN LLAMADA";

            tiempoIntervalo = setInterval(() => {
                segundosTranscurridos++;
                const mins = String(Math.floor(segundosTranscurridos / 60)).padStart(2, '0');
                const secs = String(segundosTranscurridos % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        document.getElementById('btnMute').addEventListener('click', () => {
            if (localStream) {
                const audioTracks = localStream.getAudioTracks();
                if (audioTracks.length > 0) {
                    microfonoActivo = !microfonoActivo;
                    audioTracks[0].enabled = microfonoActivo;
                    
                    const btnMute = document.getElementById('btnMute');
                    if (microfonoActivo) {
                        btnMute.innerText = "Silenciar";
                        btnMute.classList.remove('muted');
                    } else {
                        btnMute.innerText = "Mutear activado";
                        btnMute.classList.add('muted');
                    }
                }
            }
        });

        document.getElementById('btnAccion').addEventListener('click', () => {
            document.getElementById('status').innerText = "Llamando...";
            solicitarMicrofono(() => {
                peerConnection = new RTCPeerConnection(rtcConfig);
                
                if (localStream) {
                    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                }

                peerConnection.onicecandidate = event => {
                    if (event.candidate) {
                        socket.emit('relay-signaling', { target: miDestinatario, payload: { type: 'candidate', candidate: event.candidate } });
                    }
                };

                peerConnection.ontrack = event => {
                    console.log("[WEBRTC] Recibiendo audio remoto...");
                    document.getElementById('remoteAudio').srcObject = event.streams[0];
                };

                peerConnection.createOffer()
                    .then(offer => peerConnection.setLocalDescription(offer))
                    .then(() => {
                        socket.emit('relay-signaling', { target: miDestinatario, payload: { type: 'offer', sdp: peerConnection.localDescription } });
                    })
                    .catch(e => console.error(e));
            });
        });

        function configurarSenales() {
            socket.on('signaling-message', data => {
                const payload = data.payload;
                
                if (payload.type === 'offer') {
                    document.getElementById('status').innerText = "Llamada entrante...";
                    solicitarMicrofono(() => {
                        peerConnection = new RTCPeerConnection(rtcConfig);
                        
                        if (localStream) {
                            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                        }

                        peerConnection.onicecandidate = event => {
                            if (event.candidate) {
                                socket.emit('relay-signaling', { target: miDestinatario, payload: { type: 'candidate', candidate: event.candidate } });
                            }
                        };

                        peerConnection.ontrack = event => {
                            document.getElementById('remoteAudio').srcObject = event.streams[0];
                        };

                        peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp))
                            .then(() => peerConnection.createAnswer())
                            .then(answer => peerConnection.setLocalDescription(answer))
                            .then(() => {
                                socket.emit('relay-signaling', { target: miDestinatario, payload: { type: 'answer', sdp: peerConnection.localDescription } });
                                iniciarTemporizador();
                            })
                            .catch(e => console.error(e));
                    });
                } 
                else if (payload.type === 'answer') {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp))
                        .then(() => {
                            iniciarTemporizador();
                        })
                        .catch(e => console.error(e));
                } 
                else if (payload.type === 'candidate' && peerConnection) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(payload.candidate))
                        .catch(e => console.error(e));
                }
            });
        }
    </script>
</body>
</html>
