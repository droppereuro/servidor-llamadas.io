<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuestro Espacio Privado</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0; background: #121212; color: white; font-family: system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .setup-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 20px;
        }
        .call-screen { display: none; flex-direction: column; height: 100vh; position: relative; }
        video { width: 100%; height: 50%; object-fit: cover; background: #1e1e1e; }
        #remoteVideo { height: 65%; }
        #localVideo { height: 35%; border-top: 2px solid #333; }
        
        /* Temporizador elegante arriba en la pantalla */
        .timer-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); padding: 8px 16px; border-radius: 20px;
            font-size: 14px; font-weight: bold; letter-spacing: 1px; display: none; z-index: 10;
            border: 1px solid #444; color: #2ed573;
        }

        .controls {
            padding: 20px; display: flex; justify-content: center; gap: 10px;
            background: #1a1a1a; position: absolute; bottom: 0; width: 100%; box-sizing: border-box;
        }
        button {
            padding: 15px 30px; border: none; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-user { background: #333; color: white; border: 1px solid #555; }
        .btn-call { background: #2ed573; color: white; flex: 2; }
        .btn-mute { background: #ff4757; color: white; flex: 1; display: none; }
        .btn-mute.muted { background: #ffa502; color: black; }
    </style>
</head>
<body>

    <!-- 1. Pantalla de Selección de Usuario -->
    <div id="setupScreen" class="setup-screen">
        <h2>¿Quién eres?</h2>
        <button class="btn-user" onclick="iniciarApp('daniel')">Soy Daniel (PC/Android)</button>
        <button class="btn-user" onclick="iniciarApp('gisel')">Soy Gisel (iPhone)</button>
    </div>

    <!-- 2. Pantalla de la Llamada -->
    <div id="callScreen" class="call-screen">
        <div id="timer" class="timer-container">TIEMPO: 00:00</div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="controls">
            <button class="btn-mute" id="btnMute">Silenciar</button>
            <button class="btn-call" id="btnAccion">Iniciar Cámara y Llamar</button>
        </div>
    </div>

    <script>
        const SERVIDOR_URL = "https://servidor-llamadas-zg5q.onrender.com"; 
        
        let socket;
        let peerConnection;
        let localStream;
        let miUsuario = "";
        let miDestinatario = "";
        let tiempoIntervalo;
        let segundosTranscurridos = 0;
        let microfonoActivo = true;

        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function iniciarApp(usuario) {
            miUsuario = usuario;
            miDestinatario = (usuario === 'daniel') ? 'gisel' : 'daniel';

            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('btnAccion').innerText = `Llamar a ${miDestinatario.toUpperCase()}`;

            socket = io(SERVIDOR_URL);
            socket.emit('register', miUsuario);

            configurarSenales();
        }

        // Función adaptada para no crashearse si no hay webcam pero sí micro
        function solicitarMedios(restricciones, callbackExito) {
            navigator.mediaDevices.getUserMedia(restricciones)
                .then(stream => {
                    localStream = stream;
                    document.getElementById('localVideo').srcObject = stream;
                    document.getElementById('btnMute').style.display = 'block'; // Mostrar botón de silenciar
                    callbackExito();
                })
                .catch(error => {
                    console.warn("Fallo pidiendo hardware completo:", error.name);
                    if (restricciones.video) {
                        // Reintento automático solo con audio/micrófono si falla el vídeo
                        solicitarMedios({ video: false, audio: true }, callbackExito);
                    } else {
                        alert("Error: No se ha detectado ningún micrófono activo en este dispositivo.");
                    }
                });
        }

        // Lógica del temporizador de llamada
        function iniciarTemporizador() {
            if (tiempoIntervalo) clearInterval(tiempoIntervalo);
            segundosTranscurridos = 0;
            const contenedorTimer = document.getElementById('timer');
            contenedorTimer.style.display = 'block';

            tiempoIntervalo = setInterval(() => {
                segundosTranscurridos++;
                const mins = String(Math.floor(segundosTranscurridos / 60)).padStart(2, '0');
                const secs = String(segundosTranscurridos % 60).padStart(2, '0');
                contenedorTimer.innerText = `EN LLAMADA: ${mins}:${secs}`;
            }, 1000);
        }

        // Acción del botón Silenciar / Mutear micro
        document.getElementById('btnMute').addEventListener('click', () => {
            if (localStream) {
                const audioTracks = localStream.getAudioTracks();
                if (audioTracks.length > 0) {
                    microfonoActivo = !microfonoActivo;
                    audioTracks[0].enabled = microfonoActivo; // Activa o desactiva la pista
                    
                    const btnMute = document.getElementById('btnMute');
                    if (microfonoActivo) {
                        btnMute.innerText = "Silenciar";
                        btnMute.classList.remove('muted');
                    } else {
                        btnMute.innerText = "Mutear activado";
                        btnMute.classList.add('muted');
                    }
                }
            }
        });

        document.getElementById('btnAccion').addEventListener('click', () => {
            solicitarMedios({ video: true, audio: true }, () => {
                peerConnection = new RTCPeerConnection(rtcConfig);
                
                if (localStream) {
                    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                }

                peerConnection.onicecandidate = event => {
                    if (event.candidate) {
                        socket.emit('relay-signaling', { target: miDestinatario, payload: { type: 'candidate', candidate: event.candidate } });
                    }
                };

                peerConnection.ontrack = event => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                };

                peerConnection.createOffer()
                    .then(offer => peerConnection.setLocalDescription(offer))
                    .then(() => {
                        socket.emit('relay-signaling', { target: miDestinatario, payload: { type: 'offer', sdp: peerConnection.localDescription } });
                        console.log("Oferta enviada.");
                    })
                    .catch(e => console.error(e));
            });
        });

        function configurarSenales() {
            socket.on('signaling-message', data => {
                const payload = data.payload;
                
                if (payload.type === 'offer') {
                    solicitarMedios({ video: true, audio: true }, () => {
                        peerConnection = new RTCPeerConnection(rtcConfig);
                        
                        if (localStream) {
                            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                        }

                        peerConnection.onicecandidate = event => {
                            if (event.candidate) {
                                socket.emit('relay-signaling', { target: miDestinatario, payload: { type: 'candidate', candidate: event.candidate } });
                            }
                        };

                        peerConnection.ontrack = event => {
                            document.getElementById('remoteVideo').srcObject = event.streams[0];
                        };

                        peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp))
                            .then(() => peerConnection.createAnswer())
                            .then(answer => peerConnection.setLocalDescription(answer))
                            .then(() => {
                                socket.emit('relay-signaling', { target: miDestinatario, payload: { type: 'answer', sdp: peerConnection.localDescription } });
                                iniciarTemporizador(); // Arranca el contador para quien recibe la llamada
                            })
                            .catch(e => console.error(e));
                    });
                } 
                else if (payload.type === 'answer') {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp))
                        .then(() => {
                            iniciarTemporizador(); // Arranca el contador para quien inició la llamada
                        })
                        .catch(e => console.error(e));
                } 
                else if (payload.type === 'candidate' && peerConnection) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(payload.candidate))
                        .catch(e => console.error(e));
                }
            });
        }
    </script>
</body>
</html>
